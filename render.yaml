services:
  - type: web
    name: servicehub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: servicehub-db
          property: connectionString
      - key: DATABASE_SSL
        value: false
      - key: NODE_ENV
        value: production

databases:
  - name: servicehub-db
    plan: free
